<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réinitialisation | jëndUp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #4361ee, #6c5ce7);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
    }
    .card {
      background: white;
      max-width: 420px;
      width: 90%;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #4361ee, #6c5ce7);
      padding: 30px;
      text-align: center;
      color: white;
    }
    .header h2 { margin: 0; font-size: 24px; font-weight: 700; }
    .header p  { margin: 10px 0 0; opacity: 0.9; font-size: 14px; }
    .content   { padding: 30px; }

    .alerte {
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alerte-info    { background: #e0e7ff; color: #1e40af; }
    .alerte-success { background: #d1fae5; color: #065f46; }
    .alerte-danger  { background: #fee2e2; color: #991b1b; }

    .champ-groupe   { position: relative; margin-bottom: 15px; }
    .champ-icone {
      position: absolute; left: 15px; top: 50%;
      transform: translateY(-50%); color: #94a3b8; z-index: 1;
    }
    .toggle-btn {
      position: absolute; right: 15px; top: 50%;
      transform: translateY(-50%); color: #94a3b8;
      cursor: pointer; z-index: 1; background: none; border: none; padding: 0;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 14px 45px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s;
      background: #f8fafc;
      box-sizing: border-box;
    }
    input:focus {
      border-color: #4361ee;
      background: white;
      box-shadow: 0 0 0 4px rgba(67,97,238,0.1);
      outline: none;
    }
    .strength-bar  { height: 4px; border-radius: 4px; background: #e2e8f0; margin-top: 6px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s; width: 0%; }
    .strength-label{ font-size: 12px; margin-top: 4px; min-height: 18px; }

    .submit-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #4361ee, #6c5ce7);
      border: none; border-radius: 12px;
      color: white; font-weight: 700; font-size: 16px;
      cursor: pointer; transition: all 0.3s; margin-top: 10px;
      box-shadow: 0 4px 6px rgba(67,97,238,0.2);
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(67,97,238,0.3);
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .footer-links { text-align: center; margin-top: 20px; }
    .footer-links a { color: #4361ee; text-decoration: none; font-size: 14px; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h2><i class="fas fa-exchange-alt me-2"></i>jëndUp</h2>
    <p>Réinitialisation du mot de passe</p>
  </div>

  <div class="content">
    <div id="zone-alerte"></div>

    <!-- Chargement initial -->
    <div id="loading-zone" class="text-center" style="padding:20px 0;">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-3 text-muted small">Vérification du lien...</p>
    </div>

    <!-- Formulaire (affiché après vérification réussie) -->
    <div id="password-form" class="hidden">
      <div class="champ-groupe">
        <i class="fas fa-lock champ-icone"></i>
        <input type="password" id="new_password"
               placeholder="Nouveau mot de passe (min. 6 caractères)"
               oninput="checkStrength(this.value)">
        <button type="button" class="toggle-btn" onclick="toggleVis('new_password', this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label"></div>

      <br>

      <div class="champ-groupe">
        <i class="fas fa-check-circle champ-icone"></i>
        <input type="password" id="confirm_password" placeholder="Confirmer le mot de passe">
        <button type="button" class="toggle-btn" onclick="toggleVis('confirm_password', this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="resetPassword()">
        <i class="fas fa-key me-2"></i>Réinitialiser mon mot de passe
      </button>
    </div>

    <!-- Token invalide ou expiré -->
    <div id="invalid-token-message" class="hidden">
      <div class="alerte alerte-danger">
        <i class="fas fa-exclamation-circle"></i>
        <div>
          <strong>Lien invalide ou expiré</strong><br>
          Ce lien n'est plus valable. Veuillez faire une nouvelle demande.
        </div>
      </div>
      <a href="connexion.html"
         style="display:block;padding:14px;background:#4361ee;color:white;text-decoration:none;
                border-radius:12px;margin-top:15px;text-align:center;font-weight:600;">
        <i class="fas fa-redo me-2"></i>Faire une nouvelle demande
      </a>
    </div>

    <div class="footer-links">
      <a href="connexion.html"><i class="fas fa-arrow-left"></i> Retour à la connexion</a>
    </div>
  </div>
</div>

<!-- ✅ Supabase3 JS SDK via CDN — on l'utilise directement, sans edge function -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL      = "https://kkgguofgpzdlgtbzvnzn.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrZ2d1b2ZncHpkbGd0Ynp2bnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5OTI3MTgsImV4cCI6MjA4NjU2ODcxOH0.4BP8UbxgRa3ZSueS9XBNpx3JEG9yz7Un97RnoHh1Ksc";

  // Créer le client Supabase
  const supabase3 = supabase_js.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      // Important : laisser Supabase détecter automatiquement la session
      // depuis le fragment #access_token dans l'URL
      detectSessionInUrl: true,
      persistSession: true,
    }
  });

  // ── Helpers UI ──────────────────────────────────────────────────────────
  function show(type, msg) {
    const icons = {
      success : "fa-check-circle",
      info    : "fa-spinner fa-spin",
      danger  : "fa-exclamation-circle"
    };
    document.getElementById("zone-alerte").innerHTML =
      `<div class="alerte alerte-${type}">
         <i class="fas ${icons[type] || icons.danger}"></i>
         <span>${msg}</span>
       </div>`;
  }

  function toggleVis(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon  = btn.querySelector("i");
    if (input.type === "password") {
      input.type = "text";
      icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
      input.type = "password";
      icon.classList.replace("fa-eye-slash", "fa-eye");
    }
  }

  function showForm() {
    document.getElementById("loading-zone").classList.add("hidden");
    document.getElementById("password-form").classList.remove("hidden");
  }

  function showInvalidToken() {
    document.getElementById("loading-zone").classList.add("hidden");
    document.getElementById("password-form").classList.add("hidden");
    document.getElementById("invalid-token-message").classList.remove("hidden");
    document.getElementById("zone-alerte").innerHTML = "";
  }

  // ── Indicateur de force ─────────────────────────────────────────────────
  function checkStrength(value) {
    const fill  = document.getElementById("strength-fill");
    const label = document.getElementById("strength-label");
    if (!value) { fill.style.width = "0%"; label.textContent = ""; return; }

    let score = 1;
    if (value.length >= 6)           score++;
    if (value.length >= 10)          score++;
    if (/[A-Z]/.test(value))         score++;
    if (/[0-9]/.test(value))         score++;
    if (/[^A-Za-z0-9]/.test(value))  score++;

    const levels = [
      { pct: "15%",  color: "#ef4444", text: "Très faible" },
      { pct: "30%",  color: "#ef4444", text: "Très faible" },
      { pct: "50%",  color: "#f97316", text: "Faible"      },
      { pct: "70%",  color: "#eab308", text: "Moyen"       },
      { pct: "85%",  color: "#22c55e", text: "Fort"        },
      { pct: "100%", color: "#16a34a", text: "Très fort"   },
    ];
    const lvl = levels[Math.min(score - 1, levels.length - 1)];
    fill.style.width      = lvl.pct;
    fill.style.background = lvl.color;
    label.textContent     = lvl.text;
    label.style.color     = lvl.color;
  }

  // ── Vérification de la session au chargement ────────────────────────────
  // Supabase lit automatiquement le fragment #access_token=...&type=recovery
  // et crée une session temporaire. On écoute l'événement PASSWORD_RECOVERY.
  
  supabase3.auth.onAuthStateChange((event, session) => {
    console.log("🔔 Auth event:", event, session?.user?.email);

    if (event === "PASSWORD_RECOVERY") {
      // ✅ Supabase3 a détecté le lien de reset et établi une session temporaire
      console.log("✅ Session de récupération établie pour:", session.user.email);
      showForm();

    } else if (event === "SIGNED_IN" && window.location.hash.includes("type=recovery")) {
      // Fallback : certaines versions triggent SIGNED_IN au lieu de PASSWORD_RECOVERY
      console.log("✅ (fallback) Connexion de récupération pour:", session.user.email);
      showForm();
    }
  });

  // Timeout : si après 4s aucun événement n'a été reçu, le lien est invalide
  const timeoutLienInvalide = setTimeout(() => {
    const formVisible = !document.getElementById("password-form").classList.contains("hidden");
    if (!formVisible) {
      console.warn("⏱ Timeout — aucun token valide détecté");
      showInvalidToken();
    }
  }, 4000);

  // ── Réinitialisation du mot de passe ────────────────────────────────────
  // ✅ Pas d'edge function — on utilise directement supabase3.auth.updateUser()
  // La session temporaire créée par PASSWORD_RECOVERY nous autorise à faire ça.
  
  async function resetPassword() {
    const pass    = document.getElementById("new_password").value.trim();
    const confirm = document.getElementById("confirm_password").value.trim();

    if (pass.length < 6) {
      show("danger", "❌ Mot de passe trop court (6 caractères minimum)");
      return;
    }
    if (pass !== confirm) {
      show("danger", "❌ Les mots de passe ne correspondent pas");
      return;
    }

    show("info", "⏳ Traitement en cours...");
    const btn = document.getElementById("submit-btn");
    btn.disabled = true;

    try {
      // ✅ updateUser() fonctionne grâce à la session temporaire PASSWORD_RECOVERY
      const { error } = await supabase3.auth.updateUser({ password: pass });

      if (error) {
        console.error("❌ Erreur updateUser:", error.message);
        throw error;
      }

      clearTimeout(timeoutLienInvalide);
      console.log("✅ Mot de passe mis à jour avec succès");
      show("success", "✅ Votre mot de passe a été modifié avec succès !");

      document.getElementById("new_password").disabled     = true;
      document.getElementById("confirm_password").disabled = true;

      // Déconnecter la session temporaire puis rediriger
      await supabase3.auth.signOut();
      setTimeout(() => {
        window.location.href = "connexion.html?reset=success";
      }, 2000);

    } catch (e) {
      btn.disabled = false;
      show("danger", `❌ ${e.message || "Erreur lors de la réinitialisation"}`);
    }
  }

  // Soumettre avec Entrée
  document.addEventListener("keydown", (e) => {
    const formVisible = !document.getElementById("password-form").classList.contains("hidden");
    if (e.key === "Enter" && formVisible) resetPassword();
  });
</script>

</body>
</html>

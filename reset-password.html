<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réinitialisation | jëndUp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap (optionnel, mais gardé pour la cohérence) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      background: linear-gradient(135deg, #4361ee, #6c5ce7);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
    }

    .card {
      background: white;
      max-width: 420px;
      width: 90%;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #4361ee, #6c5ce7);
      padding: 30px;
      text-align: center;
      color: white;
    }

    .header h2 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }

    .header p {
      margin: 10px 0 0;
      opacity: 0.9;
      font-size: 14px;
    }

    .content {
      padding: 30px;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alert-info { 
      background: #e0e7ff; 
      color: #1e40af; 
    }
    .alert-success { 
      background: #d1fae5; 
      color: #065f46; 
    }
    .alert-danger { 
      background: #fee2e2; 
      color: #991b1b; 
    }
    .alert-warning {
      background: #fff3cd;
      color: #856404;
    }

    .input-group {
      position: relative;
      margin-bottom: 15px;
    }

    .input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      z-index: 1;
    }

    input {
      width: 100%;
      padding: 14px 14px 14px 45px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s;
      background: #f8fafc;
      box-sizing: border-box;
    }

    input:focus {
      border-color: #4361ee;
      background: white;
      box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
      outline: none;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4361ee, #6c5ce7);
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
      box-shadow: 0 4px 6px rgba(67, 97, 238, 0.2);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(67, 97, 238, 0.3);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .footer-links {
      text-align: center;
      margin-top: 20px;
    }

    .footer-links a {
      color: #4361ee;
      text-decoration: none;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    .security-badge {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 12px;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h2><i class="fas fa-exchange-alt me-2"></i>jëndUp</h2>
    <p>Réinitialisation du mot de passe</p>
    <div class="security-badge">
      <i class="fas fa-lock me-1"></i> Lien sécurisé
    </div>
  </div>

  <div class="content">
    <div id="alert"></div>

    <!-- Champ caché pour le token -->
    <input type="hidden" id="token">

    <!-- Formulaire de nouveau mot de passe (visible si token valide) -->
    <div id="password-form">
      <!-- Nouveau mot de passe -->
      <div class="input-group">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" id="new_password" placeholder="Nouveau mot de passe (min. 6 caractères)">
      </div>

      <!-- Confirmation -->
      <div class="input-group">
        <i class="fas fa-check-circle input-icon"></i>
        <input type="password" id="confirm_password" placeholder="Confirmer le mot de passe">
      </div>

      <!-- Bouton de validation -->
      <button onclick="resetPassword()">
        <i class="fas fa-key me-2"></i>Réinitialiser
      </button>
    </div>

    <!-- Message d'erreur pour token invalide -->
    <div id="invalid-token-message" class="hidden">
      <div class="alert alert-danger">
        <i class="fas fa-exclamation-circle"></i>
        <div>
          <strong>Lien invalide ou expiré</strong><br>
          Ce lien de réinitialisation n'est plus valable.
        </div>
      </div>
      <a href="forgot-password.html" class="btn btn-primary w-100 text-center" style="display:block; padding:14px; background:#4361ee; color:white; text-decoration:none; border-radius:12px; margin-top:15px;">
        <i class="fas fa-redo me-2"></i>Refaire une demande
      </a>
    </div>

    <!-- Lien de retour -->
    <div class="footer-links">
      <a href="connexion.html">
        <i class="fas fa-arrow-left"></i>
        Retour à la connexion
      </a>
    </div>
  </div>
</div>

<script>
    // Récupérer le token depuis l'URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    
    // Stocker le token
    document.getElementById("token").value = token || "";

    // Vérifier si le token existe
    if (!token) {
        document.getElementById("password-form").classList.add('hidden');
        document.getElementById("invalid-token-message").classList.remove('hidden');
    }

    function show(type, msg) {
        document.getElementById("alert").innerHTML = 
            `<div class="alert alert-${type}">
                <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'danger' ? 'fa-exclamation-circle' : type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i>
                ${msg}
            </div>`;
    }

    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function resetPassword() {
        const token = document.getElementById("token").value;
        const pass = document.getElementById("new_password").value;
        const confirm = document.getElementById("confirm_password").value;

        // Vérifications
        if (!token) {
            show("danger", "❌ Token manquant. Veuillez refaire une demande.");
            return;
        }

        if (pass.length < 6) {
            show("danger", "❌ Mot de passe trop court (6 caractères minimum)");
            return;
        }

        if (pass !== confirm) {
            show("danger", "❌ Les mots de passe ne correspondent pas");
            return;
        }

        show("info", "⏳ Traitement en cours...");

        try {
            // Clé anonyme Supabase pour jëndUp
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrZ2d1b2ZncHpkbGd0Ynp2bnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5OTI3MTgsImV4cCI6MjA4NjU2ODcxOH0.4BP8UbxgRa3ZSueS9XBNpx3JEG9yz7Un97RnoHh1Ksc';

            const res = await fetch(
                "https://kkgguofgpzdlgtbzvnzn.supabase.co/functions/v1/jendup-reset-password",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({
                        token: token,
                        new_password: pass
                    }),
                }
            );

            const data = await res.json();

            if (res.ok) {
                show("success", "✅ Votre mot de passe a été modifié avec succès !");
                
                // Désactiver les champs
                document.getElementById("new_password").disabled = true;
                document.getElementById("confirm_password").disabled = true;

                setTimeout(() => {
                    window.location.href = "connexion.html?reset=success";
                }, 2000);

            } else {
                if (data.error === "Token invalide ou expiré") {
                    show("danger", "❌ Ce lien a expiré ou n'est plus valide");
                    document.getElementById("password-form").classList.add('hidden');
                    document.getElementById("invalid-token-message").classList.remove('hidden');
                } else {
                    show("danger", data.error || "❌ Erreur lors de la réinitialisation");
                }
            }

        } catch (e) {
            console.error("Erreur:", e);
            show("danger", "❌ Impossible de contacter le serveur. Vérifiez votre connexion.");
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réinitialisation - jëndUp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }

    .reset-card {
      background: white;
      max-width: 480px;
      width: 100%;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-header {
      background: linear-gradient(135deg, #4361ee, #6c5ce7);
      padding: 40px 30px;
      text-align: center;
      color: white;
      position: relative;
    }

    .card-header::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 0;
      right: 0;
      height: 40px;
      background: white;
      border-radius: 50% 50% 0 0;
    }

    .logo-icon {
      width: 70px;
      height: 70px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 30px;
      border: 3px solid rgba(255, 255, 255, 0.3);
    }

    .card-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .card-header p {
      font-size: 16px;
      opacity: 0.9;
      margin: 0;
    }

    .security-badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.15);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      margin-top: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .security-badge i {
      margin-right: 6px;
    }

    .card-body {
      padding: 40px 30px;
    }

    .alert {
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 25px;
      font-size: 14px;
      border: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .alert i {
      font-size: 18px;
    }

    .alert-info { 
      background: #e0e7ff; 
      color: #1e40af; 
    }
    
    .alert-success { 
      background: #d1fae5; 
      color: #065f46; 
    }
    
    .alert-danger { 
      background: #fee2e2; 
      color: #991b1b; 
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .label-icon {
      margin-right: 8px;
      color: #4361ee;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      color: #94a3b8;
      font-size: 18px;
      z-index: 2;
    }

    .input-wrapper input {
      width: 100%;
      height: 52px;
      padding: 0 45px 0 48px;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      font-size: 15px;
      transition: all 0.3s;
      background: #f8fafc;
    }

    .input-wrapper input:focus {
      border-color: #4361ee;
      background: white;
      box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
      outline: none;
    }

    .input-wrapper input::placeholder {
      color: #94a3b8;
    }

    .password-toggle {
      position: absolute;
      right: 16px;
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      width: auto;
      margin: 0;
      z-index: 2;
      transition: color 0.3s;
    }

    .password-toggle:hover {
      color: #4361ee;
      transform: none !important;
      box-shadow: none !important;
    }

    .password-requirements {
      background: #f8fafc;
      border-radius: 14px;
      padding: 20px;
      margin: 20px 0 25px;
      border: 1px solid #e2e8f0;
    }

    .requirements-title {
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 15px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .requirements-title i {
      color: #4361ee;
    }

    .requirement-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      font-size: 14px;
      transition: all 0.3s;
    }

    .requirement-item i {
      width: 18px;
      font-size: 14px;
    }

    .requirement-valid {
      color: #059669;
    }

    .requirement-valid i {
      color: #059669;
    }

    .requirement-invalid {
      color: #b91c1c;
    }

    .requirement-invalid i {
      color: #b91c1c;
    }

    .btn-reset {
      width: 100%;
      height: 54px;
      background: linear-gradient(135deg, #4361ee, #6c5ce7);
      border: none;
      border-radius: 14px;
      color: white;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 10px 0 20px;
      box-shadow: 0 4px 6px rgba(67, 97, 238, 0.2);
    }

    .btn-reset:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(67, 97, 238, 0.3);
    }

    .btn-reset:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #a0a0a0;
    }

    .btn-reset i {
      font-size: 18px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer-links {
      text-align: center;
      margin-top: 20px;
    }

    .footer-links a {
      color: #4361ee;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .footer-links a:hover {
      color: #1e40af;
      text-decoration: underline;
    }

    .hidden-fields {
      display: none;
    }
  </style>
</head>
<body>
  <div class="reset-card">
    <!-- En-tête -->
    <div class="card-header">
      <div class="logo-icon">
        <i class="fas fa-exchange-alt"></i>
      </div>
      <h1>jëndUp</h1>
      <p>Réinitialisation du mot de passe</p>
      <div class="security-badge">
        <i class="fas fa-lock"></i>
        Lien sécurisé - 1 heure
      </div>
    </div>

    <!-- Corps de la carte -->
    <div class="card-body">
      <!-- Zone d'alerte -->
      <div id="alert"></div>

      <!-- Champs cachés pour l'email et le token -->
      <input type="hidden" id="email">
      <input type="hidden" id="token">

      <!-- Nouveau mot de passe -->
      <div class="form-group">
        <label>
          <i class="fas fa-key label-icon"></i>
          Nouveau mot de passe
        </label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input 
            type="password" 
            id="new_password" 
            placeholder="Au moins 6 caractères"
            autocomplete="new-password"
          >
          <button type="button" class="password-toggle" id="togglePassword">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <!-- Confirmation -->
      <div class="form-group">
        <label>
          <i class="fas fa-check-circle label-icon"></i>
          Confirmer le mot de passe
        </label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input 
            type="password" 
            id="confirm_password" 
            placeholder="Confirmez votre mot de passe"
            autocomplete="new-password"
          >
          <button type="button" class="password-toggle" id="toggleConfirmPassword">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <!-- Exigences du mot de passe -->
      <div class="password-requirements">
        <div class="requirements-title">
          <i class="fas fa-shield-alt"></i>
          Votre mot de passe doit :
        </div>
        <div class="requirement-item" id="reqLength">
          <i class="fas fa-times-circle"></i>
          <span>Contenir au moins 6 caractères</span>
        </div>
        <div class="requirement-item" id="reqMatch">
          <i class="fas fa-times-circle"></i>
          <span>Correspondre à la confirmation</span>
        </div>
      </div>

      <!-- Bouton de réinitialisation -->
      <button class="btn-reset" id="resetBtn" disabled>
        <span id="btnText">Réinitialiser mon mot de passe</span>
        <span id="btnSpinner" class="spinner" style="display: none;"></span>
      </button>

      <!-- Lien de retour -->
      <div class="footer-links">
        <a href="connexion.html">
          <i class="fas fa-arrow-left"></i>
          Retour à la connexion
        </a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>

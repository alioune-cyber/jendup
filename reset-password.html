<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réinitialisation | jëndUp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      background: linear-gradient(135deg, #4361ee, #6c5ce7);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
    }

    .card {
      background: white;
      max-width: 420px;
      width: 90%;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #4361ee, #6c5ce7);
      padding: 30px;
      text-align: center;
      color: white;
    }

    .header h2 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }

    .header p {
      margin: 10px 0 0;
      opacity: 0.9;
      font-size: 14px;
    }

    .content {
      padding: 30px;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alert-info    { background: #e0e7ff; color: #1e40af; }
    .alert-success { background: #d1fae5; color: #065f46; }
    .alert-danger  { background: #fee2e2; color: #991b1b; }

    .input-group {
      position: relative;
      margin-bottom: 15px;
    }

    .input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      z-index: 1;
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      cursor: pointer;
      z-index: 1;
      background: none;
      border: none;
      padding: 0;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 14px 45px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s;
      background: #f8fafc;
      box-sizing: border-box;
    }

    input:focus {
      border-color: #4361ee;
      background: white;
      box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
      outline: none;
    }

    /* Barre de force du mot de passe */
    .strength-bar {
      height: 4px;
      border-radius: 4px;
      background: #e2e8f0;
      margin-top: 6px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }

    .strength-label {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }

    button.submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4361ee, #6c5ce7);
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
      box-shadow: 0 4px 6px rgba(67, 97, 238, 0.2);
    }

    button.submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(67, 97, 238, 0.3);
    }

    button.submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .footer-links {
      text-align: center;
      margin-top: 20px;
    }

    .footer-links a {
      color: #4361ee;
      text-decoration: none;
      font-size: 14px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h2><i class="fas fa-exchange-alt me-2"></i>jëndUp</h2>
    <p>Réinitialisation du mot de passe</p>
  </div>

  <div class="content">
    <div id="alert"></div>

    <!-- Formulaire de réinitialisation -->
    <div id="password-form">

      <div class="input-group">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" id="new_password"
               placeholder="Nouveau mot de passe (min. 6 caractères)"
               oninput="checkStrength(this.value)">
        <button type="button" class="toggle-password" onclick="toggleVisibility('new_password', this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label"></div>

      <br>

      <div class="input-group">
        <i class="fas fa-check-circle input-icon"></i>
        <input type="password" id="confirm_password" placeholder="Confirmer le mot de passe">
        <button type="button" class="toggle-password" onclick="toggleVisibility('confirm_password', this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>

      <button class="submit-btn" onclick="resetPassword()">
        <i class="fas fa-key me-2"></i>Réinitialiser mon mot de passe
      </button>
    </div>

    <!-- Message d'erreur token invalide -->
    <div id="invalid-token-message" class="hidden">
      <div class="alert alert-danger">
        <i class="fas fa-exclamation-circle"></i>
        <div>
          <strong>Lien invalide ou expiré</strong><br>
          Ce lien de réinitialisation n'est plus valable. Veuillez refaire une demande.
        </div>
      </div>
      <a href="connexion.html"
         style="display:block;padding:14px;background:#4361ee;color:white;text-decoration:none;border-radius:12px;margin-top:15px;text-align:center;font-weight:600;">
        <i class="fas fa-redo me-2"></i>Faire une nouvelle demande
      </a>
    </div>

    <div class="footer-links">
      <a href="connexion.html">
        <i class="fas fa-arrow-left"></i> Retour à la connexion
      </a>
    </div>
  </div>
</div>

<script>
  // ✅ Récupérer UNIQUEMENT le token depuis l'URL (jamais l'email)
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  // Si pas de token → afficher le message d'erreur immédiatement
  if (!token || token.trim() === "") {
    document.getElementById("password-form").classList.add("hidden");
    document.getElementById("invalid-token-message").classList.remove("hidden");
  }

  // Affichage d'une alerte
  function show(type, msg) {
    document.getElementById("alert").innerHTML =
      `<div class="alert alert-${type}">
         <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'info' ? 'fa-spinner fa-spin' : 'fa-exclamation-circle'}"></i>
         <span>${msg}</span>
       </div>`;
  }

  // Afficher / masquer le mot de passe
  function toggleVisibility(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector("i");
    if (input.type === "password") {
      input.type = "text";
      icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
      input.type = "password";
      icon.classList.replace("fa-eye-slash", "fa-eye");
    }
  }

  // Indicateur de force du mot de passe
  function checkStrength(value) {
    const fill  = document.getElementById("strength-fill");
    const label = document.getElementById("strength-label");

    if (value.length === 0) {
      fill.style.width = "0%";
      label.textContent = "";
      return;
    }

    let score = 0;
    if (value.length >= 6)  score++;
    if (value.length >= 10) score++;
    if (/[A-Z]/.test(value)) score++;
    if (/[0-9]/.test(value)) score++;
    if (/[^A-Za-z0-9]/.test(value)) score++;

    const levels = [
      { pct: "20%", color: "#ef4444", text: "Très faible" },
      { pct: "40%", color: "#f97316", text: "Faible" },
      { pct: "60%", color: "#eab308", text: "Moyen" },
      { pct: "80%", color: "#22c55e", text: "Fort" },
      { pct: "100%", color: "#16a34a", text: "Très fort" },
    ];

    const lvl = levels[Math.min(score - 1, 4)];
    fill.style.width = lvl.pct;
    fill.style.background = lvl.color;
    label.textContent = lvl.text;
    label.style.color = lvl.color;
  }

  // Soumission du formulaire
  async function resetPassword() {
    if (!token) {
      show("danger", "❌ Token manquant. Veuillez refaire une demande.");
      return;
    }

    const pass    = document.getElementById("new_password").value.trim();
    const confirm = document.getElementById("confirm_password").value.trim();

    if (pass.length < 6) {
      show("danger", "❌ Mot de passe trop court (6 caractères minimum)");
      return;
    }

    if (pass !== confirm) {
      show("danger", "❌ Les mots de passe ne correspondent pas");
      return;
    }

    show("info", "⏳ Traitement en cours...");

    // Désactiver le bouton pendant la requête
    const btn = document.querySelector(".submit-btn");
    btn.disabled = true;

    try {
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrZ2d1b2ZncHpkbGd0Ynp2bnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5OTI3MTgsImV4cCI6MjA4NjU2ODcxOH0.4BP8UbxgRa3ZSueS9XBNpx3JEG9yz7Un97RnoHh1Ksc";

      const res = await fetch(
        "https://kkgguofgpzdlgtbzvnzn.supabase.co/functions/v1/jendup-reset-password",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
          },
          body: JSON.stringify({
            token: token,       // ✅ Seulement le token, jamais l'email
            new_password: pass,
          }),
        }
      );

      const data = await res.json();

      if (res.ok && data.success) {
        show("success", "✅ Votre mot de passe a été modifié avec succès !");

        // Désactiver les champs
        document.getElementById("new_password").disabled = true;
        document.getElementById("confirm_password").disabled = true;

        // Redirection vers la connexion après 2 secondes
        setTimeout(() => {
          window.location.href = "connexion.html?reset=success";
        }, 2000);

      } else {
        btn.disabled = false;

        if (res.status === 401 || data.error === "Token invalide ou expiré") {
          // Masquer le formulaire et afficher le message d'erreur token
          document.getElementById("password-form").classList.add("hidden");
          document.getElementById("invalid-token-message").classList.remove("hidden");
          document.getElementById("alert").innerHTML = "";
        } else {
          show("danger", `❌ ${data.error || "Erreur lors de la réinitialisation"}`);
        }
      }

    } catch (e) {
      console.error("Erreur réseau:", e);
      btn.disabled = false;
      show("danger", "❌ Impossible de contacter le serveur. Vérifiez votre connexion.");
    }
  }

  // Permettre la soumission avec la touche Entrée
  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && token) resetPassword();
  });
</script>

</body>
</html>
